# ─── default (dev) ───────────────────────────────────────────────────────────
spring:
  application:
    name: todo-service

  datasource:
    url: jdbc:postgresql://localhost:5432/todo-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: disable

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  security:
    jwt:
      secretKey: RkJ3bG9ZQm1uQ2pZbWZrU2xZb2F4dFJtN2V5Q1hKcHhWQ0ZqZ3pHUT0=

services:
  notification-url: http://localhost:6062
  user-url: http://localhost:6061

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo_service: DEBUG        # see all your log.info/debug calls
    org.springframework.web: DEBUG # see incoming requests
    org.springframework.security: DEBUG

server:
  port: 6063

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ─── prod ────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${TODO_DB_URL}
    username: ${TODO_DB_USERNAME}
    password: ${TODO_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  security:
    jwt:
      secretKey: ${JWT_SECRET_KEY}

services:
  notification-url: ${NOTIFICATION_SERVICE_URL}
  user-url: ${USER_SERVICE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo_service: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

server:
  port: ${SERVER_PORT:6063}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html