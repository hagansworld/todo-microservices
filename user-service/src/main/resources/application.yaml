# ─── default (dev) ───────────────────────────────────────────────────────────
spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/todo-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: disable

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  security:
    jwt:
      secretKey: RkJ3bG9ZQm1uQ2pZbWZrU2xZb2F4dFJtN2V5Q1hKcHhWQ0ZqZ3pHUT0=
      expiration-time: 3600000
      refresh-token: 604800000

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}

admin:
  seed:
    email: ${ADMIN_SEED_EMAIL}
    password: ${ADMIN_SEED_PASSWORD}

#  notification-service
services:
  notification-url: http://localhost:6062

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo.user_service: DEBUG   # see all your log.info/debug calls
    org.springframework.web: DEBUG # see incoming requests
    org.springframework.security: DEBUG # see auth/JWT decisions


server:
  port: 6061

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ─── prod ────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${TODO_DB_URL}
    username: ${TODO_DB_USERNAME}
    password: ${TODO_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  security:
    jwt:
      secretKey: ${JWT_SECRET_KEY}
      expiration-time: 3600000
      refresh-token: 604800000

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}

admin:
  seed:
    email: ${ADMIN_SEED_EMAIL}
    password: ${ADMIN_SEED_PASSWORD}

services:
  notification-url: ${NOTIFICATION_SERVICE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo.user_service: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO


server:
  port: ${SERVER_PORT:6061}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html