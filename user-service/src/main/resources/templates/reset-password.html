<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body>
<h2>Reset Your Password</h2>

<!-- The form where users will enter their new password -->
<form id="resetPasswordForm">
    <label for="newPassword">New Password:</label>
    <input type="password" id="newPassword" name="newPassword" required>
    <br><br>
    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
    <br><br>
    <button type="submit">Reset Password</button>
</form>

<script>
    // Extract the token from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Check if the token exists
    if (!token) {
        alert("Invalid or missing token.");
        window.location.href = '/';  // Redirect to home if no token
    }

    // Handle form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get the values of the new password and confirm password
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validate that the passwords match
        if (newPassword !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        // Send a POST request to the backend to reset the password
        fetch('http://localhost:6061/api/auth/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                token: token,  // Include the reset token
                newPassword: newPassword,
                confirmPassword: confirmPassword
            })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Password reset successful!');
                    // Redirect user to the login page or another page after success
                    window.location.href = '/login';  // Adjust URL as needed
                } else {
                    alert('Error resetting password: ' + data.message);
                }
            })
            .catch(error => {
                alert('Error resetting password: ' + error.message);
            });
    });
</script>
</body>
</html>
