# ─── default (dev) ───────────────────────────────────────────────────────────
spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/todo-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: disable

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587                          # ← was 465 (SSL/blocked by Render); 587 uses STARTTLS
    username: ${SUPPORT_EMAIL}
    password: ${APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: false      # ← disable implicit SSL (was true)
      mail.smtp.starttls.enable: true  # ← enable STARTTLS upgrade on 587
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: smtp.gmail.com

tasktide:
  app-url: http://localhost:6061

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo.notification_service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.mail: DEBUG

server:
  port: 6062

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ─── prod ────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${TODO_DB_URL}
    username: ${TODO_DB_USERNAME}
    password: ${TODO_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587                          # ← was 465 (SSL/blocked by Render); 587 uses STARTTLS
    username: ${SUPPORT_EMAIL}
    password: ${APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: false      # ← disable implicit SSL
      mail.smtp.starttls.enable: true  # ← enable STARTTLS upgrade on 587
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: smtp.gmail.com

tasktide:
  app-url: ${TASKTIDE_APP_URL}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.todo.notification_service: INFO
    org.springframework.web: INFO
    org.springframework.mail: INFO

server:
  port: ${SERVER_PORT:6062}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html